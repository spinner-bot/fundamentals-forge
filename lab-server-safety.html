<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #fafaf7; color: #333; line-height: 1.8; display: flex;
}
.sidebar {
  position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
  background: linear-gradient(180deg, #1a0000 0%, #2d0a0a 100%);
  color: #ccc; overflow-y: auto; z-index: 100;
  padding: 24px 0; font-size: 0.88rem;
  box-shadow: 2px 0 20px rgba(0,0,0,0.15);
}
.sidebar-header {
  text-align: center; padding: 0 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 12px;
}
.sidebar-header h2 { color: #fff; font-size: 1.1rem; margin-top: 8px; }
.sidebar-header .lx-icon {
  width: 48px; height: 48px; background: linear-gradient(135deg, #ff6b6b, #d32f2f); border-radius: 12px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 24px; color: #fff; font-weight: bold;
}
.sidebar-nav { padding: 0 12px; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px; color: #b0a0a0;
  text-decoration: none; transition: all 0.2s; margin-bottom: 2px;
}
.sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(255,107,107,0.1); color: #ffcccc; }
.sidebar-nav a .nav-emoji { font-size: 1.1rem; width: 24px; text-align: center; flex-shrink: 0; }
.sidebar-nav a .nav-num { font-size: 0.7rem; color: #ff6b6b; font-weight: 700; width: 20px; flex-shrink: 0; }
.sidebar-nav .nav-section { color: #665555; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; padding: 16px 12px 6px; }
.sidebar-footer {
  text-align: center; padding: 20px; color: #665555; font-size: 0.75rem;
  border-top: 1px solid rgba(255,255,255,0.06); margin-top: 20px;
}
.main { margin-left: 280px; flex: 1; min-height: 100vh; }
.hero {
  background: linear-gradient(135deg, #1a0000 0%, #3d0505 40%, #d32f2f 100%);
  color: #fff; padding: 60px 48px 48px; text-align: center;
  position: relative; overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.hero h1 { font-size: 2.5rem; font-weight: 800; position: relative; }
.hero .subtitle { font-size: 1.1rem; opacity: 0.85; margin-top: 12px; position: relative; }
.hero .badges { margin-top: 18px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; position: relative; }
.hero .badges img { height: 22px; }
.content { max-width: 900px; margin: 0 auto; padding: 40px 48px 60px; }
h2 {
  font-size: 1.7rem; color: #1a0000; margin: 48px 0 20px;
  padding-bottom: 10px; border-bottom: 3px solid #d32f2f;
  display: flex; align-items: center; gap: 10px;
}
h3 { font-size: 1.25rem; color: #3d0505; margin: 32px 0 14px; }
h4 { font-size: 1.05rem; color: #444; margin: 20px 0 8px; }
p { margin: 12px 0; }
a { color: #c62828; text-decoration: none; }
a:hover { text-decoration: underline; }
code {
  background: #fff; border: 1px solid #e0d8d8; border-radius: 4px;
  padding: 2px 6px; font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
  font-size: 0.88em; color: #c7254e;
}
pre {
  background: #1a0a0a; color: #e0c0c0; border-radius: 10px;
  padding: 20px 24px; overflow-x: auto; margin: 16px 0;
  font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
  font-size: 0.86rem; line-height: 1.65;
  box-shadow: 0 2px 12px rgba(0,0,0,0.12);
}
pre code { background: none; border: none; padding: 0; color: inherit; font-size: inherit; }
table {
  width: 100%; border-collapse: collapse; margin: 16px 0;
  border-radius: 8px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.05);
}
thead { background: #1a0000; color: #ffcccc; }
th { padding: 10px 14px; text-align: left; font-weight: 600; font-size: 0.9rem; }
td { padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
tbody tr { background: #fff; transition: background 0.15s; }
tbody tr:hover { background: #fff0f0; }
tbody tr:nth-child(even) { background: #fdf9f9; }
tbody tr:nth-child(even):hover { background: #fff0f0; }
blockquote {
  border-left: 4px solid #d32f2f; background: #fff5f5;
  margin: 16px 0; padding: 14px 20px; border-radius: 0 8px 8px 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.03);
}
blockquote p { margin: 4px 0; }
blockquote.tip { border-left-color: #2e7d32; background: #e8f5e9; }
blockquote.warning { border-left-color: #f57c00; background: #fff3e0; }
blockquote.danger { border-left-color: #c62828; background: #ffebee; }
.callout {
  padding: 16px 20px; margin: 16px 0; border-radius: 10px;
  display: flex; gap: 10px; align-items: flex-start;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.callout .callout-icon { font-size: 1.3rem; flex-shrink: 0; }
.callout.note { background: #e3f2fd; border: 1px solid #bbdefb; }
.callout.warn { background: #fff8e1; border: 1px solid #ffe082; }
.callout.danger { background: #ffebee; border: 1px solid #ffcdd2; }
.callout.success { background: #e8f5e9; border: 1px solid #c8e6c9; }
.mermaid {
  background: #fdf9f9; border-radius: 10px; padding: 24px;
  margin: 20px 0; text-align: center;
  box-shadow: 0 1px 6px rgba(0,0,0,0.05); overflow-x: auto;
}
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 0.78rem; font-weight: 600; color: #fff;
}
.badge-green { background: #2e7d32; }
.badge-yellow { background: #f57c00; }
.badge-red { background: #c62828; }
.badge-purple { background: #6a1b9a; }
.cmd-card {
  background: #fff; border-radius: 12px; padding: 24px; margin: 24px 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.05); border: 1px solid #f0e0e0;
  transition: box-shadow 0.2s;
}
.cmd-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.cmd-card .cmd-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap;
}
.cmd-card .cmd-name {
  font-family: 'Cascadia Code', 'Fira Code', monospace;
  font-size: 1.2rem; font-weight: 700; color: #1a0000;
  background: #fff5f5; padding: 4px 12px; border-radius: 6px;
}
.cmd-card .cmd-header .badges-row { display: flex; gap: 6px; }
.cmd-card .formula {
  background: #fff5f5; border-left: 3px solid #d32f2f;
  padding: 10px 16px; margin: 12px 0; border-radius: 0 6px 6px 0;
  font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.9rem;
}
.cmd-card .one-liner { color: #666; font-style: italic; margin-bottom: 16px; }

/* Danger highlight box */
.danger-box {
  background: #fff5f5; border: 2px solid #c62828; border-radius: 12px;
  padding: 20px 24px; margin: 20px 0;
  box-shadow: 0 2px 12px rgba(198,40,40,0.12);
}
.danger-box h4 { color: #c62828; margin-top: 0; }
.rule-box {
  background: #fffff0; border-left: 4px solid #f57c00; border-radius: 0 8px 8px 0;
  padding: 14px 18px; margin: 14px 0;
}
.rule-box.good { border-left-color: #2e7d32; background: #f0fff0; }

hr { border: none; border-top: 1px solid #e8d8d8; margin: 32px 0; }
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .hero { padding: 40px 24px; }
  .hero h1 { font-size: 1.6rem; }
  .content { padding: 24px 20px; }
}
</style>
<script>
mermaid.initialize({ startOnLoad: true, theme: 'base', securityLevel: 'loose',
  themeVariables: {
    primaryColor: '#ffcdd2', primaryBorderColor: '#c62828',
    secondaryColor: '#fff3e0', secondaryBorderColor: '#f57c00',
    tertiaryColor: '#c8e6c9', tertiaryBorderColor: '#2e7d32',
    lineColor: '#555', textColor: '#333', fontSize: '14px'
  }
});
</script>
