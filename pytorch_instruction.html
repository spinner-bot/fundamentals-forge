*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; font-size: 16px; }
body {

  background: #f5f5f0; color: #333; line-height: 1.75; display: flex;
}
.sidebar {
  position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
  background: linear-gradient(180deg, #1a0510 0%, #2d0a1e 100%);
  color: #ccc; overflow-y: auto; z-index: 100;
  padding: 24px 0; font-size: 0.9rem;
  box-shadow: 2px 0 20px rgba(0,0,0,0.15);
}
.sidebar-header {
  text-align: center; padding: 0 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 12px;
}
.sidebar-header h2 { color: #fff; font-size: 1.15rem; margin-top: 8px; }
.sidebar-header .lx-icon {
  width: 48px; height: 48px; background: #EE4C2C; border-radius: 12px;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px; color: #fff; font-weight: bold;
}
.sidebar-nav { padding: 0 12px; }
.sidebar-nav a {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 12px; border-radius: 8px; color: #b0b0c0;
  text-decoration: none; transition: all 0.2s; margin-bottom: 2px;
}
.sidebar-nav a:hover, .sidebar-nav a.active { background: rgba(255,255,255,0.08); color: #fff; }
.sidebar-nav a .nav-emoji { font-size: 1.1rem; width: 24px; text-align: center; flex-shrink: 0; }
.sidebar-nav a .nav-num { font-size: 0.7rem; color: #EE4C2C; font-weight: 700; width: 20px; flex-shrink: 0; }
.sidebar-nav .nav-section { color: #888; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; padding: 16px 12px 6px; }
.sidebar-footer {

  border-top: 1px solid rgba(255,255,255,0.08); margin-top: 20px;
}
.main { margin-left: 280px; flex: 1; min-height: 100vh; }
.hero {
  background: linear-gradient(135deg, #1a0510 0%, #2d0a1e 40%, #EE4C2C 100%);

}

.hero .badges { margin-top: 20px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; position: relative; }
.hero .badges img { height: 22px; }
.content { max-width: 900px; margin: 0 auto; padding: 40px 48px 60px; }
h2 {
  font-size: 1.8rem; color: #1a0510; margin: 48px 0 20px;
  padding-bottom: 10px; border-bottom: 3px solid #EE4C2C;
  display: flex; align-items: center; gap: 10px;
}

h4 { font-size: 1.05rem; color: #555; margin: 20px 0 8px; }
p { margin: 12px 0; }
a { color: #EE4C2C; text-decoration: none; }
a:hover { text-decoration: underline; }
code {
  background: #fff; border: 1px solid #e0e0d8; border-radius: 4px;
  padding: 2px 6px; font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
  font-size: 0.88em; color: #d63384;
}
pre {
  background: #1e1e2e; color: #cdd6f4; border-radius: 10px;

  font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
  font-size: 0.88rem; line-height: 1.6;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}
pre code { background: none; border: none; padding: 0; color: inherit; font-size: inherit; }
table {
  width: 100%; border-collapse: collapse; margin: 16px 0;
  border-radius: 8px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,0.06);
}
thead { background: #1a0510; color: #fff; }
th { padding: 10px 14px; text-align: left; font-weight: 600; font-size: 0.9rem; }
td { padding: 10px 14px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
tbody tr { background: #fff; transition: background 0.15s; }
tbody tr:hover { background: #feefea; }
tbody tr:nth-child(even) { background: #fafaf7; }
tbody tr:nth-child(even):hover { background: #feefea; }
blockquote {
  border-left: 4px solid #EE4C2C; background: #fff;
  margin: 16px 0; padding: 14px 20px; border-radius: 0 8px 8px 0;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
blockquote p { margin: 4px 0; }
blockquote.tip { border-left-color: #2da44e; }
blockquote.warning { border-left-color: #bf8700; }
blockquote.danger { border-left-color: #cf222e; }
blockquote.info { border-left-color: #0969da; }
.callout {
  padding: 16px 20px; margin: 16px 0; border-radius: 10px;
  display: flex; gap: 10px; align-items: flex-start;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.callout .callout-icon { font-size: 1.3rem; flex-shrink: 0; }
.callout.note { background: #ddf4ff; border: 1px solid #b3dfff; }
.callout.warn { background: #fff8e1; border: 1px solid #ffe082; }
.callout.danger { background: #ffebee; border: 1px solid #ef9a9a; }
.callout.success { background: #e8f5e9; border: 1px solid #a5d6a7; }
.mermaid {
  background: #fafaf7; border-radius: 10px; padding: 24px;
  margin: 20px 0; text-align: center;
  box-shadow: 0 1px 6px rgba(0,0,0,0.06); overflow-x: auto;
}
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 0.78rem; font-weight: 600; color: #fff;
}
.badge-green { background: #2da44e; }
.badge-yellow { background: #bf8700; }
.badge-red { background: #cf222e; }
.badge-purple { background: #8250df; }
.badge-blue { background: #0969da; }
.cmd-card {
  background: #fff; border-radius: 12px; padding: 24px; margin: 24px 0;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06); border: 1px solid #eee;
  transition: box-shadow 0.2s;
}
.cmd-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.cmd-card .cmd-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap;
}
.cmd-card .cmd-name {
  font-family: 'Cascadia Code', 'Fira Code', monospace;
  font-size: 1.25rem; font-weight: 700; color: #1a0510;
  background: #f5f5f0; padding: 4px 12px; border-radius: 6px;
}
.cmd-card .cmd-header .badges-row { display: flex; gap: 6px; }
.cmd-card .formula {
  background: #fafaf7; border-left: 3px solid #EE4C2C;
  padding: 10px 16px; margin: 12px 0; border-radius: 0 6px 6px 0;
  font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 0.9rem;
}
.cmd-card .one-liner { color: #666; font-style: italic; margin-bottom: 16px; }
hr { border: none; border-top: 1px solid #e0e0d8; margin: 32px 0; }
@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
  .hero { padding: 40px 24px; }
  .hero h1 { font-size: 1.8rem; }
  .content { padding: 24px 20px; }
}
